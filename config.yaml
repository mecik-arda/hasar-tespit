proje:
  ad: HADES Hasar Tespiti
  surum: 1.0.0
veri:
  etiket_klasoru: hasar-ornek
  etiketli_klasor: hasar-ornek-labelli
  cikti_klasoru: data
  train_orani: 0.8
  val_orani: 0.2
  arama_terimleri:
    Cizik: araba cizik hasar
    Gocuk: araba gocuk hasar
    Cam Kirigi: kirik araba cami
    Pas: araba pas hasar
    Kus Pisligi: araba kus pisligi
    Far Kirigi: kirik araba fari
    Patlak Lastik: patlak araba lastigi
augmentation:
  aktif: true
  carpma_katsayisi: 3
  donderme_acisi: 15
  parlaklik_limit: 0.3
  kontrast_limit: 0.3
  yatay_cevirme: true
  dikey_cevirme: false
  gauss_gurultu: true
  bulaniklastirma: true
model:
  tur: yolo
  agirlik: yolov8n.pt
  epoch_sayisi: 100
  batch_size: auto
  img_size: 640
  cihaz: auto
egitim:
  transfer_ogrenimi: true
  optimizer: auto
  lr0: 0.01
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3
  warmup_momentum: 0.8
  warmup_bias_lr: 0.1
  fl_gamma: 1.5
cikarim:
  guven_esigi: 0.25
  iou_esigi: 0.7
  cikti_klasoru: runs/predict
  gorsel_kaydet: true
  json_kaydet: true
  tta_aktif: false
  tta_adaptif:
    aktif: true
    analiz_uzun_kenar: 640
    karanlik_medyan_esigi: 55
    parlak_medyan_esigi: 205
    siyah_piksel_esigi: 15
    beyaz_piksel_esigi: 245
    siyaha_kirpma_orani_esigi: 0.2
    beyaza_kirpma_orani_esigi: 0.12
    laplacian_referansi: 180
    tenengrad_referansi: 1800
    kenar_yogunlugu_referansi: 0.08
    minimum_netlik_analiz_kontrasti: 8
    minimum_netlik_analiz_kenar_orani: 0.005
    netlik_skoru_esigi: 0.42
    agir_bulaniklik_esigi: 0.18
    canny_alt_esik: 60
    canny_ust_esik: 180
    gamma: 0.7
    parlaklik_gamma: 1.25
    clahe_clip_limiti: 2.0
    clahe_izgara_boyutu: 8
    yuksek_olcek: 1.25
    yatay_cevirme: true
    azami_varyant: 3
    model_ici_iou_esigi: 0.55
    kalibrasyon:
      minimum_map50_artisi: 0.02
      guven_duzeyi: 0.95
      bootstrap_tekrari: 1000
      azami_gecikme_artisi_yuzdesi: 200
  sinif_guven_esikleri:
    0: 0.3
    1: 0.2
    2: 0.45
    3: 0.25
    4: 0.35
    5: 0.4
    6: 0.4
  sahi_aktif: true
  sahi_dilim_boyutu: 640
  sahi_adaptif:
    aktif: true
    hedef_siniflar:
    - Cizik
    - Pas
    minimum_uzun_kenar: 1024
    dilim_orani: 0.5
    asgari_dilim_boyutu: 384
    azami_dilim_boyutu: 768
    bindirme_orani: 0.2
    birlestirme_iou_esigi: 0.5
  max_sam_boxes: 20
siniflar:
  0: Cizik
  1: Gocuk
  2: Cam Kirigi
  3: Pas
  4: Kus Pisligi
  5: Far Kirigi
  6: Patlak Lastik
multi_model:
  aktif: true
  siralama:
  - rt-detr-v2-x
  - yolov12x
  - sam2_small
  - florence-2
  agirliklar:
    rtdetr: rtdetr-v2-x.pt
    yolo: yolov12x.pt
    sam: sam2_s.pt
  denetleyici_ayarlari:
    model: models/florence_hades_lora
    gorev: <OD>
    dogrudan_sinif_ciktisi: true
    ekstra_siniflar:
    - lastik patlagi
    - flat tire
  ram_optimizasyonu: true
  otomatik_yedekleme_cpu: true
  model_optimizasyonu: openvino
  wbf_iou_esigi: 0.55
  guven_esigi: 0.25
  wbf_dinamik_agirliklandirma:
    aktif: true
    metrik_adi: mAP50
    asgari_agirlik: 1.0
    azami_agirlik: 2.5
    duyarlilik: 4.0
    model_metrikleri:
      rt-detr-v2-x:
        genel: 0.965
        siniflar: {}
      yolov12x:
        genel: 0.937
        siniflar: {}
  wbf_sinif_agirliklari:
    Cizik:
      yolov12x: 2.0
      rt-detr-v2-x: 1.0
    Gocuk:
      rt-detr-v2-x: 2.0
      yolov12x: 1.0
ai_router:
  model_adi: openai/clip-vit-base-patch32
  cop_baraji: 0.7
